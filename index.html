/* =========================
   BACKGROUND BANNER BLUR
========================= */

body{
    font-family:'Poppins',sans-serif;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    min-height:100vh;
    margin:0;
    color:#fff;
    overflow-x:hidden;
    position:relative;
}

/* Banner blur fullscreen */
body::before{
    content:"";
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:url('https://ratefd.net/images/banner-mahadewi77.webp') center center/cover no-repeat;
    filter:blur(15px);
    transform:scale(1.15);
    z-index:-2;
}

/* Overlay gelap */
body::after{
    content:"";
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:
        linear-gradient(
            rgba(0,0,0,.55),
            rgba(0,0,0,.55)
        );
    z-index:-1;
}

/* Semua konten di atas background */
header,
footer,
.logo,
.marquee-container,
.banner,
.buttons{
    position:relative;
    z-index:10;
}

/* =========================
   HEADER & FOOTER
========================= */

header,
footer{
    width:100%;
    text-align:center;
    padding:10px;
}

/* =========================
   LOGO
========================= */

.logo{
    max-width:180px;
    margin:15px 0;
    filter:drop-shadow(0 0 25px #fff);
    animation:pulseLogo 3s ease-in-out infinite alternate;
}

@keyframes pulseLogo{
    0%{
        filter:drop-shadow(0 0 10px #ff00ff);
    }
    100%{
        filter:drop-shadow(0 0 30px #00ffff);
    }
}

/* =========================
   MARQUEE
========================= */

.marquee-container{
    width:340px;
    overflow:hidden;
    white-space:nowrap;
    border:3px double #fff;
    border-radius:12px;
    background:rgba(0,0,0,.5);
    box-shadow:0 0 25px #fff;
    margin:15px 0;
}

.marquee{
    display:inline-block;
    padding-left:100%;
    animation:marquee 7s linear infinite;
    color:#ffea00;
    font-weight:900;
    text-shadow:0 0 15px #00ffff,0 0 25px #ff00ff;
}

@keyframes marquee{
    0%{
        transform:translateX(0);
    }
    100%{
        transform:translateX(-100%);
    }
}

/* =========================
   BANNER
========================= */

.banner{
    max-width:320px;
    margin:10px 0;
    border-radius:15px;
    box-shadow:0 0 40px #ffffff;
    animation:glowBanner 4s ease-in-out infinite alternate;
}

@keyframes glowBanner{
    0%{
        box-shadow:0 0 20px #00ffff;
    }
    100%{
        box-shadow:0 0 40px #ff00ff;
    }
}

/* =========================
   BUTTONS
========================= */

.buttons{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    width:100%;
    max-width:340px;
    gap:12px;
}

.button{
    flex:1 1 45%;
    font-size:14px;
    font-weight:800;
    padding:12px 0;
    color:#fff;
    border:none;
    border-radius:12px;
    text-transform:uppercase;
    text-decoration:none;
    text-align:center;
    letter-spacing:1px;
    transition:.25s;
}

.button-daftar{
    background:linear-gradient(45deg,#1f0901,#cddc39);
    box-shadow:0 0 25px #ff4500;
}

.button-rtp{
    background:linear-gradient(45deg,#00ffff,#007bff);
    box-shadow:0 0 25px #00e5ff;
}

.button-chat{
    background:linear-gradient(45deg,#00ff80,#ffeb3b);
    box-shadow:0 0 25px #00ff80;
}

.button-Daftar1{
    background:linear-gradient(45deg,#ff00ff,#ffea00);
    box-shadow:0 0 25px #ff00ff;
}

.button:hover{
    transform:scale(1.1);
    filter:brightness(1.5);
}

/* =========================
   FOOTER
========================= */

footer p{
    color:#fff;
    text-shadow:0 0 8px #ff00ff;
}

footer a{
    color:#00ffff;
    text-decoration:none;
    font-weight:700;
}

/* =========================
   CONFETTI
========================= */

.confetti{
    position:fixed;
    width:10px;
    height:10px;
    top:-10px;
    animation:fallConfetti 6s linear infinite;
    opacity:.8;
    z-index:1;
}

@keyframes fallConfetti{
    0%{
        transform:translateY(0) rotate(0deg);
        opacity:1;
    }
    100%{
        transform:translateY(100vh) rotate(720deg);
        opacity:0;
    }
}

.confetti:nth-child(odd){
    background:#ff00ff;
}

.confetti:nth-child(even){
    background:#00ffff;
}

.confetti:nth-child(3n){
    background:#cddc39;
}

.confetti:nth-child(5n){
    background:#ffeb3b;
}

.confetti:nth-child(7n){
    background:#ff4500;
}
